name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/readme-craft

            # 备份当前构建
            if [[ -d frontend/dist ]]; then
              mkdir -p backups/$(date +%Y%m%d_%H%M%S)
              cp -r frontend/dist backups/$(date +%Y%m%d_%H%M%S)/
            fi

            # Git pull
            git fetch origin main
            git reset --hard origin/main

            # 前端构建
            npm install --silent
            npm run build

            # 后端依赖
            cd server && npm install --silent && cd ..

            # 使用 Repository Variables 注入生产 OAuth 凭证
            sed -i 's|^GITHUB_CLIENT_ID=.*|GITHUB_CLIENT_ID=${{ vars.PROD_CLIENT_ID }}|' server/.env
            sed -i 's|^GITHUB_CLIENT_SECRET=.*|GITHUB_CLIENT_SECRET=${{ vars.PROD_CLIENT_SECRET }}|' server/.env
            sed -i 's|FRONTEND_URL=.*|FRONTEND_URL=https://openginko.tech|' server/.env
            sed -i '/^OAUTH_CALLBACK_URL=/d' server/.env && echo "OAUTH_CALLBACK_URL=https://openginko.tech/api/auth/github/callback" >> server/.env

            # 重启 PM2
            pm2 restart readme-craft-api || pm2 start server/dist/index.js --name readme-craft-api

            # 健康检查
            sleep 2
            curl -s https://openginko.tech/api/health

            echo "==> 部署完成"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/readme-craft
            LATEST=$(ls -t backups/ | head -1)
            if [[ -n "$LATEST" ]]; then
              cp -r backups/$LATEST/dist frontend/
              pm2 restart readme-craft-api
            fi
            echo "==> 已回滚"
