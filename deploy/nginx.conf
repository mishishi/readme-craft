# ================================================
# Nginx Site 配置模板
# ================================================
# 用法：
#   1. 复制此文件到 /etc/nginx/sites-available/your-project
#   2. 根据项目修改下方的变量占位符（或在 deploy.conf 中配置）
#   3. 创建软链接: ln -s /etc/nginx/sites-available/your-project /etc/nginx/sites-enabled/
#   4. 测试: nginx -t
#   5. 重载: nginx -s reload
# ================================================
#
# deploy.sh 会自动替换以下占位符：
#   {{DOMAINS}}       → DOMAINS（多个域名用空格分隔）
#   {{SSL_CERT}}      → SSL_CERT
#   {{SSL_CERT_KEY}}  → SSL_CERT_KEY
#   {{DEPLOY_PATH}}   → DEPLOY_PATH
#   {{BACKEND_PORT}}  → BACKEND_PORT（默认 3001）
# ================================================

server {
    listen 443 ssl;
    server_name {{DOMAINS}};

    ssl_certificate {{SSL_CERT}};
    ssl_certificate_key {{SSL_CERT_KEY}};

    root {{DEPLOY_PATH}}/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:{{BACKEND_PORT}};
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name {{DOMAINS}};
    return 301 https://$host$request_uri;
}
