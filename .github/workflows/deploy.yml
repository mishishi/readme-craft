name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install & Build Backend
        run: |
          cd server
          npm install
          npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: ./
          remote_path: /var/www/readme-craft
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/readme-craft
            cp /var/www/readme-craft/server/.env /tmp/.env.bak 2>/dev/null || true
            [ ! -f server/.env ] && cp server/.env.example server/.env
            pm2 restart readme-craft-api 2>/dev/null || pm2 start --name readme-craft-api "node server/dist/index.js"
