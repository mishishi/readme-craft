# ================================================
# Nginx Site 配置模板
# ================================================
# 用法：
#   1. 复制此文件到 /etc/nginx/sites-available/readme-craft
#   2. 修改下方的 DOMAINS、DEPLOY_PATH、SSL 路径
#   3. 创建软链接: ln -s /etc/nginx/sites-available/readme-craft /etc/nginx/sites-enabled/
#   4. 测试: nginx -t
#   5. 重载: nginx -s reload
# ================================================

server {
    listen 443 ssl;
    # 支持多域名
    server_name openginko.tech 101.43.94.212;

    # SSL 证书（根据实际路径修改）
    ssl_certificate /etc/nginx/ssl/openginko.tech_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/openginko.tech.key;

    # 前端构建产物目录
    root /var/www/readme-craft/frontend/dist;
    index index.html;

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理后台（如果独立部署）
    location /api/admin {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name openginko.tech 101.43.94.212;
    return 301 https://$host$request_uri;
}
