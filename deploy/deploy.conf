# ========== 项目部署配置 ==========
# 复制此文件为 deploy.conf，填入实际值后使用

# 项目标识（用于目录名、PM2 名、nginx 配置名）
PROJECT_NAME=readme-craft

# 服务器部署路径
DEPLOY_PATH=/var/www/readme-craft

# Git
GIT_REPO=https://github.com/mishishi/readme-craft.git
GIT_BRANCH=main

# 构建
BUILD_CMD="npm run build"

# PM2 进程名（留空则使用 PROJECT_NAME）
PM2_NAME=

# 是否有 Node.js 后端（true/false）
HAS_BACKEND=true

# 后端构建命令（如果 HAS_BACKEND=true）
BACKEND_BUILD_CMD=""

# 后端启动命令（如果 HAS_BACKEND=true）
BACKEND_START_CMD=""

# Nginx 反向代理的后端端口
BACKEND_PORT=3001

# 域名（多个用空格分隔）
DOMAINS="openginko.tech 101.43.94.212"

# SSL 证书路径（留空则使用默认 /etc/nginx/ssl/）
SSL_CERT=""
SSL_CERT_KEY=""

# 前端构建产物路径（相对于 DEPLOY_PATH）
FRONTEND_DIST_PATH=/var/www/readme-craft/frontend/dist

# 是否更新 nginx 配置（true/false）
UPDATE_NGINX=true

# nginx 配置路径（不填则自动使用 sites-enabled/${PROJECT_NAME}）
NGINX_SITE_PATH=""

# 服务器 SSH 信息
SERVER_HOST=101.43.94.212
SERVER_USER=root
SERVER_PORT=22
