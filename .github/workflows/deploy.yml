name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install & Build Backend
        run: |
          cd server
          npm install
          npm run build

      - name: Add SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete -e "ssh -o StrictHostKeyChecking=no"
          path: ./
          remote_path: /var/www/readme-craft
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            [ ! -f /var/www/readme-craft/server/.env ] && cp /var/www/readme-craft/server/.env.example /var/www/readme-craft/server/.env
            pm2 delete readme-craft-api 2>/dev/null
            cd /var/www/readme-craft/server && pm2 start --name readme-craft-api "node dist/index.js"
