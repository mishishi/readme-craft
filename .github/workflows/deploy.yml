name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_HOST: 101.43.94.212
  DEPLOY_USER: root
  DEPLOY_PATH: /var/www/readme-craft
  GIT_REPO: https://github.com/mishishi/readme-craft.git
  PM2_NAME: readme-craft-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup current build
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST "
            if [[ -d $DEPLOY_PATH/frontend/dist ]]; then
              mkdir -p $DEPLOY_PATH/backups/$(date +%Y%m%d_%H%M%S)
              cp -r $DEPLOY_PATH/frontend/dist $DEPLOY_PATH/backups/$(date +%Y%m%d_%H%M%S)/
            fi
          "

      - name: Deploy via SSH
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST bash << 'DEPLOY_SCRIPT'
            set -e

            echo "==> 进入部署目录"
            cd /var/www/readme-craft

            echo "==> Git pull"
            git fetch origin main
            git reset --hard origin/main

            echo "==> 安装依赖 & 构建前端"
            npm install --silent
            npm run build

            echo "==> 安装后端依赖"
            cd server && npm install --silent && cd ..

            echo "==> 重启 PM2"
            pm2 restart readme-craft-api || pm2 start server/dist/index.js --name readme-craft-api

            echo "==> 测试 API 健康检查"
            sleep 2
            curl -s https://openginko.tech/api/health | head -c 100

            echo ""
            echo "==> 部署完成"
          DEPLOY_SCRIPT

      - name: Rollback on failure
        if: failure()
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST "
            cd /var/www/readme-craft
            LATEST=\$(ls -t backups/ | head -1)
            if [[ -n \"\$LATEST\" ]]; then
              cp -r backups/\$LATEST/dist frontend/
              pm2 restart readme-craft-api
            fi
          "
          echo "==> 已回滚到上一个可用版本"
